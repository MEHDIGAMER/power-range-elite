<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="25%" style="stop-color:#ffd93d"/>
      <stop offset="50%" style="stop-color:#6bcb77"/>
      <stop offset="75%" style="stop-color:#4d96ff"/>
      <stop offset="100%" style="stop-color:#9b59b6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#ffd93d;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ff6b6b" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="150" cy="200" r="80" fill="none" stroke="#ff6b6b" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="150" cy="200" r="120" fill="none" stroke="#ff6b6b" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="1050" cy="200" r="80" fill="none" stroke="#9b59b6" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="1050" cy="200" r="120" fill="none" stroke="#9b59b6" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Lightning bolt left -->
  <g transform="translate(100, 120)" fill="#ffd93d" opacity="0.15">
    <polygon points="30,0 10,35 25,35 5,70 45,28 28,28 48,0"/>
  </g>

  <!-- Lightning bolt right -->
  <g transform="translate(1060, 120)" fill="#ffd93d" opacity="0.15">
    <polygon points="30,0 10,35 25,35 5,70 45,28 28,28 48,0"/>
  </g>

  <!-- Glow behind title -->
  <text x="600" y="170" font-family="Arial Black, Impact, sans-serif" font-size="90" font-weight="900"
        text-anchor="middle" fill="url(#glow)" filter="url(#blur)">POWER-RANGE</text>

  <!-- Main title -->
  <text x="600" y="170" font-family="Arial Black, Impact, sans-serif" font-size="90" font-weight="900"
        text-anchor="middle" fill="url(#title)" filter="url(#shadow)">POWER-RANGE</text>

  <!-- Subtitle -->
  <text x="600" y="220" font-family="monospace" font-size="28" font-weight="bold"
        text-anchor="middle" fill="#ffd93d" letter-spacing="12">E L I T E</text>

  <!-- Divider -->
  <line x1="300" y1="245" x2="900" y2="245" stroke="url(#title)" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Tagline -->
  <text x="600" y="280" font-family="monospace" font-size="18"
        text-anchor="middle" fill="#888888">18 Agents  ·  13 Steps  ·  Zero Shortcuts</text>

  <!-- Bottom tagline -->
  <text x="600" y="330" font-family="monospace" font-size="16" font-style="italic"
        text-anchor="middle" fill="#ff6b6b" opacity="0.8">Power-Range is getting dangerous.</text>
  <text x="600" y="355" font-family="monospace" font-size="16" font-weight="bold"
        text-anchor="middle" fill="#ff4444">Power-Range will solve everything.</text>

